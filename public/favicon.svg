<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- 1. Heavy Black Shadow Offset Layer -->
  <rect x="12" y="20" width="44" height="28" fill="#000000"/>

  <!-- 2. Primary Flag Block (High-Visibility Civic Yellow) -->
  <rect x="8" y="16" width="44" height="28" fill="#FFDE4D" stroke="#000000" stroke-width="4" stroke-linejoin="miter"/>

  <!-- 3. Protruding Hazard Alert Indicator (Red Square Badge) -->
  <g transform="translate(42, 6) rotate(12)">
    <rect x="0" y="0" width="18" height="18" fill="#FF3333" stroke="#000000" stroke-width="3" stroke-linejoin="miter"/>
    <text x="9" y="14" font-family="monospace, Courier" font-weight="900" font-size="13" fill="#FFFFFF" text-anchor="middle">!</text>
  </g>
</svg>